<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NU Sales Dashboard</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; }
    h2 { color: #1a56a0; font-size: 18px; }

    .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .controls label { font-size: 13px; color: #444; font-weight: 600; }
    .controls input, .controls select { padding: 7px 10px; border: 1px solid #aaa; border-radius: 6px; font-size: 13px; background: #fff; cursor: pointer; }
    .controls button { padding: 7px 18px; background: #1a56a0; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }

    #table-wrap { overflow-x: auto; width: 100%; max-width: 1300px; }

    table { border-collapse: collapse; font-size: 12px; background: #fff; width: 100%; }
    th, td { border: 1px solid #999; padding: 5px 7px; text-align: center; white-space: nowrap; }

    .h-title  { background: #1a56a0; color: #fff; font-weight: 700; }
    .h-date   { background: #2271c3; color: #fff; font-weight: 600; }
    .h-col    { background: #2e86de; color: #fff; font-weight: 600; }

    .store-hd { background: #2e86de; color: #fff; font-weight: 600; }
    .store    { font-weight: 500; }

    .total    { background: #1a56a0; color: #fff; font-weight: 700; }

    .pct-red  { background: #FF0000; color: #fff; font-weight: 700; }
    .pct-yel  { background: #FFFF00; color: #000; font-weight: 700; }
    .pct-grn  { background: #00B050; color: #fff; font-weight: 700; }

    .total-pct-red { background: #FF0000; color: #fff; font-weight: 700; }
    .total-pct-yel { background: #FFFF00; color: #000; font-weight: 700; }
    .total-pct-grn { background: #00B050; color: #fff; font-weight: 700; }

    #share-btn {
      padding: 12px 32px;
      background: #25D366;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>

<h2>North Upper Sales</h2>

<div class="controls">
  <label>Date: <input type="date" id="sel-date"/></label>

  <label>Time:
    <select id="sel-hour">
      <option value="12">12:00 PM</option>
      <option value="3">3:00 PM</option>
      <option value="6">6:00 PM</option>
      <option value="9">9:00 PM</option>
    </select>
  </label>

  <button onclick="renderTable()">Show</button>
  <button onclick="loadData()">Refresh</button>
</div>

<div id="msg">
  <div id="spinner" style="display:none; width:32px; height:32px; border:4px solid #ccc; border-top-color:#1a56a0; border-radius:50%; animation:spin 0.8s linear infinite; margin:auto;"></div>
  <span id="msg-text">Fetching latest sales data...</span>
</div>

<div id="table-wrap" style="display:none;">
  <table id="sales-table"></table>
</div>

<button id="share-btn" style="display:none;" onclick="shareSnapshot()">Share</button>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzR6OU35ubJBGhjDYonuiKXGCcx1y2HqD7lJLEaQf6JlZ8DTpp9S7ZSf5d6uKZJyMNc/exec";

const STORES = [
  "Abo Qurqas","Bany Sweif","Bany Sweef Nasser","Bany Sweef Sharq",
  "El Fayoum","El-Menya","ElShawashna","El Fayoum Atsa","Senores","Beny Sweif Kornesh"
];

let rawData = [];
let dataMap = {};

const today = new Date();
document.getElementById("sel-date").value = today.toISOString().split("T")[0];

const h = today.getHours();
const hours = [12,3,6,9];
const closest = hours.reduce((a,b) => Math.abs(b-h) < Math.abs(a-h) ? b : a);
document.getElementById("sel-hour").value = closest;

async function loadData() {
  document.getElementById("spinner").style.display = "block";
  document.getElementById("msg-text").textContent = "Fetching latest sales data...";

  try {
    const res = await fetch(SCRIPT_URL);
    const json = await res.json();
    rawData = json.data;

    buildIndex();

    document.getElementById("spinner").style.display = "none";
    document.getElementById("msg-text").textContent = "";

    renderTable();
  } catch(err) {
    document.getElementById("spinner").style.display = "none";
    document.getElementById("msg-text").textContent = "Failed to load data.";
  }
}

function buildIndex() {
  dataMap = {};
  for (let i = 1; i < rawData.length; i++) {
    const row = rawData[i];
    const store = (row[2] || "").toLowerCase();
    const date = normalizeDate(row[1]);
    const hour = parseInt(row[17]);

    const key = `${store}_${date}_${hour}`;
    dataMap[key] = row;
  }
}

function normalizeDate(val) {
  const d = new Date(val);
  return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
}

function filterRow(store, selDateTs, selHour) {
  const key = `${store.toLowerCase()}_${selDateTs}_${selHour}`;
  return dataMap[key] || null;
}

function fmtPct(val) {
  if (!val) return "";
  return Math.round(parseFloat(val) * 100) + "%";
}

function pctClass(val) {
  const p = val * 100;
  if (p < 90) return "pct-red";
  if (p < 100) return "pct-yel";
  return "pct-grn";
}

function totalPctClass(val) {
  const p = val * 100;
  if (p < 90) return "total-pct-red";
  if (p < 100) return "total-pct-yel";
  return "total-pct-grn";
}

function renderTable() {
  if (!rawData.length) return;

  const selDate = document.getElementById("sel-date").value;
  const selHour = parseInt(document.getElementById("sel-hour").value);
  const selDateTs = normalizeDate(new Date(selDate));

  const table = document.getElementById("sales-table");
  table.innerHTML = "";

  STORES.forEach(store => {
    const row = filterRow(store, selDateTs, selHour);
    const tr = table.insertRow();

    const gasT = row ? row[5] : "";
    const gasS = row ? row[6] : "";
    const pct = gasT ? gasS / gasT : "";

    tr.insertCell().textContent = store;
    tr.insertCell().textContent = gasT;
    tr.insertCell().textContent = gasS;

    const c = tr.insertCell();
    c.textContent = pct ? fmtPct(pct) : "";
    c.className = pct ? pctClass(pct) : "";
  });

  document.getElementById("table-wrap").style.display = "block";
  document.getElementById("share-btn").style.display = "block";
}

async function shareSnapshot() {
  await loadHtml2Canvas();

  const tableWrap = document.getElementById("table-wrap");
  const canvas = await html2canvas(tableWrap, { scale: 2 });

  if (!navigator.share) {
    const link = document.createElement("a");
    link.download = "sales.png";
    link.href = canvas.toDataURL();
    link.click();
    return;
  }

  canvas.toBlob(async blob => {
    const file = new File([blob], "sales.png", { type: "image/png" });
    await navigator.share({ files: [file] });
  });
}

function loadHtml2Canvas() {
  return new Promise((res, rej) => {
    if (window.html2canvas) return res();
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
    s.onload = res;
    s.onerror = rej;
    document.head.appendChild(s);
  });
}

loadData();
</script>

</body>
  </html>
