<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NU Sales Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; }
    h2 { color: #1a56a0; font-size: 18px; }
    .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .controls label { font-size: 13px; color: #444; font-weight: 600; }
    .controls input, .controls select { padding: 7px 10px; border: 1px solid #aaa; border-radius: 6px; font-size: 13px; background: #fff; cursor: pointer; }
    .controls button { padding: 7px 18px; background: #1a56a0; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
    #table-wrap { overflow-x: auto; width: 100%; max-width: 1300px; }
    table { border-collapse: collapse; font-size: 12px; background: #fff; width: 100%; }
    th, td { border: 1px solid #999; padding: 5px 7px; text-align: center; white-space: nowrap; }
    .h-title  { background: #1a56a0; color: #fff; font-weight: 700; font-size: 13px; }
    .h-date   { background: #2271c3; color: #fff; font-weight: 600; }
    .h-col    { background: #2e86de; color: #fff; font-weight: 600; }
    .store-hd { background: #2e86de; color: #fff; font-weight: 600; text-align: center; }
    .store    { text-align: center; font-weight: 500; }
    .total    { background: #1a56a0; color: #fff; font-weight: 700; }
    .pct-red  { background: #e74c3c; color: #fff; font-weight: 700; }
    .pct-yel  { background: #f1c40f; color: #000; font-weight: 700; }
    .pct-grn  { background: #2ecc71; color: #000; font-weight: 700; }
    .total-pct-red { background: #e74c3c; color: #fff; font-weight: 700; }
    .total-pct-yel { background: #f1c40f; color: #000; font-weight: 700; }
    .total-pct-grn { background: #2ecc71; color: #000; font-weight: 700; }
    #share-btn { padding: 12px 32px; background: #25D366; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
    #msg { font-size: 13px; color: #555; }
  </style>
</head>
<body>

<h2>North Upper Sales</h2>
<div class="controls">
  <label>Date: <input type="date" id="sel-date"/></label>
  <label>Time:
    <select id="sel-hour">
      <option value="12">12:00 PM</option>
      <option value="15">3:00 PM</option>
      <option value="18">6:00 PM</option>
      <option value="21">9:00 PM</option>
    </select>
  </label>
  <button onclick="renderTable()">Show</button>
</div>

<div id="msg">جاري تحميل البيانات...</div>
<div id="table-wrap" style="display:none;"><table id="sales-table"></table></div>
<button id="share-btn" style="display:none;" onclick="shareSnapshot()">📤 Share</button>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzR6OU35ubJBGhjDYonuiKXGCcx1y2HqD7lJLEaQf6JlZ8DTpp9S7ZSf5d6uKZJyMNc/exec";

const STORES = [
  "Abo Qurqas","Bany Sweif","Bany Sweef Nasser","Bany Sweef Sharq",
  "El Fayoum","El-Menya","ElShawashna","El Fayoum Atsa","Senores","Beny Sweif Kornesh"
];

let rawData = [];

const today = new Date();
document.getElementById("sel-date").value = today.toISOString().split("T")[0];
const h = today.getHours();
const hours = [12,15,18,21];
const closest = hours.reduce((a,b) => Math.abs(b-h) < Math.abs(a-h) ? b : a);
document.getElementById("sel-hour").value = closest;

async function loadData() {
  try {
    const res = await fetch(SCRIPT_URL);
    const json = await res.json();
    rawData = json.data;
    document.getElementById("msg").textContent = "";
    renderTable();
  } catch(err) {
    document.getElementById("msg").textContent = "فيه مشكلة في تحميل البيانات.";
  }
}

function normalizeDate(val) {
  const d = new Date(val);
  return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
}

function filterRow(store, selDateTs, selHour) {
  for (let i = 1; i < rawData.length; i++) {
    const row = rawData[i];
    const rowStore = (row[2] || "").toString().trim();
    if (rowStore.toLowerCase() !== store.toLowerCase()) continue;
    const rowDateTs = normalizeDate(row[1]);
    if (rowDateTs !== selDateTs) continue;
    const rowReport = parseInt(row[17]);
    if (rowReport === selHour) return row;
  }
  return null;
}

function fmtPct(val) {
  if (val === "" || val === null || val === undefined) return "";
  const n = parseFloat(val);
  if (isNaN(n)) return val;
  return Math.round(n * 100) + "%";
}

function pctClass(val) {
  const n = parseFloat(val);
  if (isNaN(n) || val === "" || val === null) return "";
  const p = n * 100;
  if (p < 90)  return "pct-red";
  if (p < 100) return "pct-yel";
  return "pct-grn";
}

function totalPctClass(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return "total";
  const p = n * 100;
  if (p < 90)  return "total-pct-red";
  if (p < 100) return "total-pct-yel";
  return "total-pct-grn";
}

function renderTable() {
  if (!rawData.length) return;

  const selDateStr = document.getElementById("sel-date").value;
  const selHour = parseInt(document.getElementById("sel-hour").value);
  const selDateTs = normalizeDate(selDateStr + "T00:00:00");
  const displayDate = new Date(selDateStr).toLocaleDateString("en-GB");

  const table = document.getElementById("sales-table");
  table.innerHTML = "";
  let td;

  const r0 = table.insertRow();
  td = document.createElement("th"); td.className = "h-title"; td.textContent = ""; r0.appendChild(td);
  td = document.createElement("th"); td.className = "h-title"; td.colSpan = 6; td.textContent = "North upper sales"; r0.appendChild(td);
  ["ADSL","Connectivity","EP","Terminal","VMT","RED","MNP","CR%"].forEach(h => {
    td = document.createElement("th"); td.className = "h-title"; td.rowSpan = 3; td.textContent = h; r0.appendChild(td);
  });

  const r1 = table.insertRow();
  td = document.createElement("th"); td.className = "h-date"; td.textContent = displayDate; r1.appendChild(td);
  td = document.createElement("th"); td.className = "h-date"; td.colSpan = 3; td.textContent = "GAs"; r1.appendChild(td);
  td = document.createElement("th"); td.className = "h-date"; td.colSpan = 3; td.textContent = "Voice points"; r1.appendChild(td);

  const r2 = table.insertRow();
  ["Store","Target","Sales","%","Target","Sales","%"].forEach(h => {
    td = document.createElement("th");
    td.className = h === "Store" ? "store-hd" : "h-col";
    td.textContent = h;
    r2.appendChild(td);
  });

  let totGAsT=0, totGAsS=0, totVPT=0, totVPS=0;
  let totADSL=0, totConn=0, totEP=0, totTerm=0, totVMT=0, totRED=0, totMNP=0;
  let crSum=0, crCount=0;

  STORES.forEach(store => {
    const row = filterRow(store, selDateTs, selHour);
    const tr = table.insertRow();
    let c;

    const gasT  = row ? (parseFloat(row[5]) || 0) : 0;
    const gasS  = row ? (parseFloat(row[6]) || 0) : 0;
    const vpT   = row ? (parseFloat(row[3]) || 0) : 0;
    const vpS   = row ? (parseFloat(row[4]) || 0) : 0;
    const adsl  = row ? (parseFloat(row[7]) || 0) : 0;
    const conn  = row ? (parseFloat(row[9]) || 0) : 0;
    const ep    = row ? (parseFloat(row[10]) || 0) : 0;
    const term  = row ? (parseFloat(row[12]) || 0) : 0;
    const vmt   = row ? (parseFloat(row[13]) || 0) : 0;
    const red   = row ? (parseFloat(row[14]) || 0) : 0;
    const mnp   = row ? (parseFloat(row[15]) || 0) : 0;
    const crRaw = row ? row[16] : "";
    const crNum = row ? (parseFloat(row[16]) || 0) : 0;

    const gasPct = gasT > 0 ? gasS / gasT : "";
    const vpPct  = vpT  > 0 ? vpS  / vpT  : "";

    totGAsT += gasT; totGAsS += gasS;
    totVPT  += vpT;  totVPS  += vpS;
    totADSL += adsl; totConn += conn; totEP += ep;
    totTerm += term; totVMT  += vmt;  totRED += red; totMNP += mnp;
    if (row) { crSum += crNum; crCount++; }

    c = tr.insertCell(); c.className = "store"; c.textContent = store;
    c = tr.insertCell(); c.textContent = row ? gasT : "";
    c = tr.insertCell(); c.textContent = row ? gasS : "";
    c = tr.insertCell(); c.className = row && gasPct !== "" ? pctClass(gasPct) : ""; c.textContent = row && gasPct !== "" ? fmtPct(gasPct) : "";
    c = tr.insertCell(); c.textContent = row ? vpT : "";
    c = tr.insertCell(); c.textContent = row ? vpS : "";
    c = tr.insertCell(); c.className = row && vpPct !== "" ? pctClass(vpPct) : ""; c.textContent = row && vpPct !== "" ? fmtPct(vpPct) : "";
    c = tr.insertCell(); c.textContent = row ? adsl : "";
    c = tr.insertCell(); c.textContent = row ? conn : "";
    c = tr.insertCell(); c.textContent = row ? ep   : "";
    c = tr.insertCell(); c.textContent = row ? term : "";
    c = tr.insertCell(); c.textContent = row ? vmt  : "";
    c = tr.insertCell(); c.textContent = row ? red  : "";
    c = tr.insertCell(); c.textContent = row ? mnp  : "";
    c = tr.insertCell(); c.textContent = row ? fmtPct(crRaw) : "";
  });

  const totGAsPct = totGAsT > 0 ? totGAsS / totGAsT : 0;
  const totVPPct  = totVPT  > 0 ? totVPS  / totVPT  : 0;
  const totCR     = crCount > 0 ? crSum / crCount : 0;

  const tr = table.insertRow();
  let c;
  c = tr.insertCell(); c.className = "total"; c.textContent = "Total";
  c = tr.insertCell(); c.className = "total"; c.textContent = totGAsT;
  c = tr.insertCell(); c.className = "total"; c.textContent = totGAsS;
  c = tr.insertCell(); c.className = totalPctClass(totGAsPct); c.textContent = fmtPct(totGAsPct);
  c = tr.insertCell(); c.className = "total"; c.textContent = totVPT;
  c = tr.insertCell(); c.className = "total"; c.textContent = totVPS;
  c = tr.insertCell(); c.className = totalPctClass(totVPPct); c.textContent = fmtPct(totVPPct);
  c = tr.insertCell(); c.className = "total"; c.textContent = totADSL;
  c = tr.insertCell(); c.className = "total"; c.textContent = totConn;
  c = tr.insertCell(); c.className = "total"; c.textContent = totEP;
  c = tr.insertCell(); c.className = "total"; c.textContent = totTerm;
  c = tr.insertCell(); c.className = "total"; c.textContent = totVMT;
  c = tr.insertCell(); c.className = "total"; c.textContent = totRED;
  c = tr.insertCell(); c.className = "total"; c.textContent = totMNP;
  c = tr.insertCell(); c.className = "total"; c.textContent = fmtPct(totCR);

  document.getElementById("table-wrap").style.display = "block";
  document.getElementById("share-btn").style.display = "inline-block";
}

async function shareSnapshot() {
  if (!navigator.share) { alert("جرب من الموبايل."); return; }
  try {
    await loadHtml2Canvas();
    const tableWrap = document.getElementById("table-wrap");
    const table = document.getElementById("sales-table");

    const originalOverflow = tableWrap.style.overflow;
    const originalWidth = tableWrap.style.width;
    tableWrap.style.overflow = "visible";
    tableWrap.style.width = table.scrollWidth + "px";

    const canvas = await html2canvas(tableWrap, {
      scale: 2,
      useCORS: true,
      width: table.scrollWidth,
      windowWidth: table.scrollWidth
    });

    tableWrap.style.overflow = originalOverflow;
    tableWrap.style.width = originalWidth;

    canvas.toBlob(async blob => {
      const file = new File([blob], "sales_snapshot.png", { type: "image/png" });
      await navigator.share({ files: [file], title: "NU Sales Snapshot" });
    }, "image/png");
  } catch(err) { alert("Error: " + err.message); }
}

function loadHtml2Canvas() {
  return new Promise((res, rej) => {
    if (window.html2canvas) return res();
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

loadData();
</script>
</body>
</html>
